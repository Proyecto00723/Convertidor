<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convertidor HTML a Texto</title>

<style>
body{
font-family:monospace;
background:#111;
color:#00ff88;
padding:20px;
}

textarea{
width:100%;
height:250px;
margin-bottom:10px;
}

button{
padding:10px 15px;
cursor:pointer;
}

pre{
background:#000;
padding:20px;
white-space:pre-wrap;
margin-top:20px;
}
</style>
</head>

<body>

<h2>Convertidor HTML → Texto</h2>

<textarea id="entrada" placeholder="Pega aquí tu código HTML..."></textarea>

<br>

<button onclick="convertir()">Convertir código</button>

<pre id="resultado"></pre>

<script>

function convertir(){

let codigo = document.getElementById("entrada").value;

codigo = codigo
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

// agregar automáticamente <pre>
let resultado = "<pre>\n" + codigo + "\n</pre>";

document.getElementById("resultado").textContent = resultado;

}

</script>

</body>
</html>
