<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convertidor HTML a Texto</title>

<style>

body{
font-family:monospace;
background:#111;
color:#00ff88;
padding:20px;
}

textarea{
width:100%;
height:200px;
margin-bottom:10px;
font-family:monospace;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
border:none;
background:#00aa66;
color:white;
border-radius:5px;
}

button:hover{
background:#00cc77;
}

/* ventana resultado */
#contenedorResultado{
background:#000;
padding:15px;
margin-top:15px;
height:300px;
overflow:auto;
border:1px solid #444;
}

/* codigo */
#resultado{
white-space:pre;
color:#00ff88;
}

</style>
</head>

<body>

<h2>Convertidor HTML → Texto</h2>

<textarea id="entrada" placeholder="Pega aquí tu código HTML..."></textarea>

<br>

<button onclick="convertir()">Convertir código</button>
<button onclick="copiarCodigo()">Copiar código</button>

<div id="contenedorResultado">
<pre id="resultado"></pre>
</div>

<script>

function convertir(){

let codigo = document.getElementById("entrada").value;

codigo = codigo
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

let resultado = "<pre>\n" + codigo + "\n</pre>";

document.getElementById("resultado").textContent = resultado;

}

function copiarCodigo(){

const texto = document.getElementById("resultado").textContent;

navigator.clipboard.writeText(texto);

alert("Código copiado al portapapeles");

}

</script>

</body>
</html>
